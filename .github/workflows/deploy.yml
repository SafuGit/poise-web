name: Deploy to Surge

on:
  push:
    branches:
      - main   # runs on every commit to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build   # adjust if needed

      - name: deploying to surge
        uses: mahmoudgalalz/surge-action@v0.1.6
        with:
          domain: 'poise.surge.sh'
          path: './dist'
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}