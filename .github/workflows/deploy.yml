name: Deploy to Surge

on:
  push:
    branches:
      - main   # runs on every commit to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build   # adjust if needed

      - name: Install Surge
        run: npm install -g surge

      - name: Deploy to Surge
        run: |
          surge ./dist --domain https://poise.surge.sh --token ${{ secrets.SURGE_TOKEN }}
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
  health-check:
    runs-on: ubuntu-latest
    needs: deploy   # waits for deploy to finish

    steps:
      - name: Check site availability
        run: |
          echo "Checking site..."
          for i in {1..5}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://poise.surge.sh)
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Site is live!"
              exit 0
            fi
            echo "⏳ Retry $i..."
            sleep 5
          done
          echo "❌ Site is not responding"
          exit 1